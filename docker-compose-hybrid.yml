# 合体面板(协议+限速)测试用 compose。
# 【本地 build 源码镜像,不拉 :latest,不碰生产】,MySQL 初始化时连 hybrid schema 一起建。
#
# 用法(在一台【干净的测试机】上,别和生产面板同机跑,否则容器名/端口冲突):
#   1) 下源码:curl -L https://github.com/Teminuosi/flux-panel/archive/refs/heads/hybrid-panel.tar.gz | tar xz && cd flux-panel-hybrid-panel
#   2) 建 .env(见文件末尾示例)
#   3) docker compose -f docker-compose-hybrid.yml --env-file .env up -d --build
#      (第一次会本地编译前后端,几分钟)
#   4) 浏览器开 http://测试机IP:${FRONTEND_PORT},默认 admin_user/admin_user
services:
  mysql:
    image: mysql:5.7
    container_name: gost-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gost.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./hybrid-schema-v1.sql:/docker-entrypoint-initdb.d/02-hybrid.sql:ro
      - ./hybrid-schema-v2.sql:/docker-entrypoint-initdb.d/03-hybrid-relay.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
      --innodb_buffer_pool_size=256M
    networks:
      - gost-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./springboot-backend
      dockerfile: Dockerfile
    image: flux-backend:hybrid
    container_name: springboot-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_DIR: /app/logs
      JAVA_OPTS: "-Xms256m -Xmx512m -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai"
    ports:
      - "${BACKEND_PORT}:6365"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gost-network

  frontend:
    build:
      context: ./vite-frontend
      dockerfile: Dockerfile
    image: flux-frontend:hybrid
    container_name: vite-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - gost-network

volumes:
  mysql_data:
    name: mysql_data
    driver: local
  backend_logs:
    name: backend_logs
    driver: local

networks:
  gost-network:
    name: gost-network
    driver: bridge

# --- .env 示例(存成同目录 .env)---
# DB_NAME=gost
# DB_USER=gost
# DB_PASSWORD=换个强密码
# JWT_SECRET=换一串随机长字符串
# BACKEND_PORT=6365
# FRONTEND_PORT=6366
